<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Custom Recipes — Meal Prep Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
                    colors: {
                        stoneNeutral: { 50: '#fafaf9', 100: '#f5f5f4', 200: '#e7e5e4', 300: '#d6d3d1', 700: '#44403c', 800: '#292524', 900: '#1c1917' },
                        emeraldAccent: '#0f766e', amberAccent: '#d97706', skyAccent: '#0369a1'
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="antialiased" data-page="myrecipes">
    <div id="app-header"></div>
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <section>
            <div class="mb-6 max-w-4xl">
                <h2 class="text-xl font-bold text-stoneNeutral-900 mb-2">My Custom Recipes</h2>
                <p class="text-stoneNeutral-700 leading-relaxed text-sm">
                    View, edit, or delete the recipes you've created. They're <b>private to your account</b> —
                    <b>sign in from the header</b> to manage them. Add new ones on the
                    <a href="builder.html" class="text-skyAccent font-semibold hover:underline">+ (Add Recipe)</a> tab.
                </p>
                <p id="my-recipes-msg" class="text-xs font-semibold mt-2"></p>
            </div>
            <div id="my-recipes-list" class="space-y-2 max-w-4xl"></div>
        </section>
    </div>

    <script src="js/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/data-reconstruct.js"></script>
    <script src="js/data-layer.js"></script>
    <script src="js/state.js"></script>
    <script src="js/data.js"></script>
    <script src="js/packaging.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/app.js"></script>
    <script src="js/my-recipes.js"></script>
</body>
</html>
